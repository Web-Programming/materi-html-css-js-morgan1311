<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CCS</title>
    <style>
        /*ini internal CCS*/
        /*selector Tag HTML*/
        body{
            background-color: grey;
            text-align: center;
            font-family: 'Gill Sans', 'Gill Sans MT', 'Calibri', 'Trebuchet MS', sans-serif;
        }
        h2{
            text-decoration: underline;
        }
        div{
            border-width: 10px;
            border-style: solid;
            border-color: black;
        }
        /*selector Class*/
        .Border_warna_biru{
            border-color: blue;
        }
        .Border_warna_merah{
            border-color: red;
        }
        .Border_warna_hijau{
            border-color: green;
        }
    </style>
</head>
<body>
    <h1 style="color: blue;font-size:14pt">mengenal CCS inline</h1>
    <h style="color: red;font-family: 'Times New Roman', Times, serif; "
    >ini berwarna merah bertanda cinta</h1>
    <h2 class="Border_warna_biru"
    style="border-style: solid;">Mengenal selector pada CSS</h2>
    
    <div class="Border_warna_biru"">
        wassup ma homie
    </div>

    <div class="Border_warna_merah">
        how are u
    </div>

    <div class="Border_warna_hijau">
        aku i'm fine
    </div>
</body>
</html>
